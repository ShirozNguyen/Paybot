# Giới hạn số thông báo CÙNG LOẠI tối đa trong 1 phút (chống spam khi 1 lỗi lặp liên
# tục, vd SePay timeout liên tục). Điền 1 số nguyên bất kỳ (vd 10, 50), hoặc "false"
# để TẮT hẳn giới hạn này (hiện toàn bộ thông báo, không chặn gì cả).
# Mặc định: 20 (tức tối đa 20 thông báo/loại mỗi 60 giây — vượt mức sẽ bị chặn, không
# thông báo nữa cho tới khi qua phút kế tiếp).
Max_Notifications: 20

# ══════════════════════════════════════════════════════════════════════════════
# NOTIFICATION CONFIGS — bật/tắt từng loại thông báo/log riêng lẻ
# ══════════════════════════════════════════════════════════════════════════════
# Mỗi dòng dưới đây = 1 loại thông báo (console log và/hoặc nhắn admin online có
# quyền naptien.admin). Mặc định TẤT CẢ đều "true" (bật). Set "false" để tắt loại
# tương ứng — KHÔNG ảnh hưởng tin nhắn trực tiếp gửi cho player đang dùng lệnh
# (vd "Đơn này đã được duyệt rồi") vì đó là phản hồi thao tác, không phải log/cảnh báo.
#
# CHỐNG SPAM: dù bật, mỗi loại tối đa chỉ bắn theo giới hạn "Max_Notifications" ở trên
# (mặc định 20 lần / 60 giây) — vượt quá sẽ tự
# động im lặng bỏ qua cho tới khi qua cửa sổ 60s kế tiếp (xem NotificationManager).
notifications:
  # Player vừa được give 1 cái map QR (nạp bank) thành công
  qr-created: true
  # Tạo/tải ảnh QR thất bại (lỗi mạng, ảnh hỏng,...)
  qr-create-fail: true
  # Player vừa gửi thẻ cào (nạp thẻ) lên hệ thống (qua bot hoặc standalone)
  card-submitted: true
  # Gửi thẻ lên bot Discord thất bại (server đang ở chế độ kết nối bot)
  card-submit-fail: true
  # Lỗi giao tiếp với web gạch thẻ (site cấu hình ở /cardsetup) — log có ghi rõ tên web
  card-api-error: true
  # Lỗi giao tiếp với SePay/bot khi đăng ký hoặc poll đơn nạp bank (standalone mode)
  sepay-error: true
  # Nhận được thanh toán bank (chưa duyệt) — thông báo admin online vào duyệt
  bank-payment-received: true
  # Duyệt đơn (card/bank) thất bại — vd lệnh thưởng dispatch lỗi ngay lúc duyệt
  approve-fail: true
  # Lệnh thưởng (reward command) chạy thất bại hoặc chưa được cấu hình cho mệnh giá
  reward-invalid: true
  # Log mỗi lần 1 lệnh thưởng được dispatch (console only — khá nhiều, có thể tắt nếu ồn)
  reward-dispatch: true
  # Đơn được duyệt nhưng player offline → lưu vào hàng chờ (console only, không spam chat)
  reward-queued-offline: true
  # Bắn pháo hoa / âm thanh thành tựu epic thất bại (lỗi tạo Firework, sound,...)
  firework-fail: true
  # Đơn QR nạp bank hết hạn (quá 30 phút chưa thanh toán, standalone mode)
  order-expired: true
  # Bot Discord tự ngắt kết nối với server (mất kết nối, bot restart,...)
  bot-disconnect: true
  # Lỗi xử lý webhook HTTP (SePay IPN, lệnh thưởng đẩy từ bot,...)
  http-error: true
  # Phát hiện có bản plugin mới trên Modrinth (cũng dùng cho thông báo "đang ở bản mới nhất")
  update-available: true
# ══════════════════════════════════════════════════════════════════════════════
