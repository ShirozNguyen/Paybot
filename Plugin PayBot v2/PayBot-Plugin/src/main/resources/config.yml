# ─────────────────────────────────────────────────────────────────────────────
# PayBot Plugin Configuration  v5.0.0
# ─────────────────────────────────────────────────────────────────────────────

# ── Connection ────────────────────────────────────────────────────────────────
# server-id và guild-id được tự động điền khi kết nối bot
# không được tự set nếu k bt gì, cần thì ib admin
# https://guns.lol/therealshiroz

server-id: ""
guild-id:  ""
bot-url:   "https://YOUR_VPS_IP:24733"


# v5.0.3: bỏ ngrok — plugin tự dò IP thật của server này (PublicIpResolver) nếu để trống.
# Chỉ set thủ công nếu server này ở sau NAT/router cần port-forward riêng.
plugin-callback-url: ""

# v5.0.3: tự đồng bộ config.yml mỗi 10s — tự thêm key/comment thiếu, tự xoá key thừa
# không còn tác dụng (từ bản cũ để lại), tự reload khi có gì thay đổi (do bot push
# bot-url mới, do admin tự sửa tay, hay do upgrade version). Tắt nếu đang tự debug
# config thủ công và không muốn bị tự động ghi đè.
auto-config-sync: true

# Fingerprint cert HTTPS của bot (TOFU — tự lưu lần đầu kết nối, đừng tự sửa tay trừ
# khi biết chắc đang làm gì). Xem BotHttpClient.java để hiểu cơ chế.
bot-cert-fingerprint: ""
# true = từ chối thẳng nếu cert bot đổi mà không khớp fingerprint đã lưu (an toàn hơn,
# phòng MITM, nhưng phải tự xoá bot-cert-fingerprint ở trên nếu đổi VPS thật).
# false (mặc định) = chỉ cảnh báo, vẫn cho qua và tự cập nhật fingerprint mới.
bot-cert-strict-pin: false

# Port HTTP server của plugin nhận SePay webhook và lệnh từ bot.
# v5.0.0 FIX: đổi default 25565 → 25580 (25565 TRÙNG port chơi Minecraft mặc định,
# khiến HTTP server của plugin bind thất bại ngay từ đầu trên mọi server chưa từng
# tự đổi port này — SePay IPN/push reward/push config từ bot ĐỀU không hoạt động được
# mà không có cảnh báo rõ ràng). Đổi nếu có xung đột hoặc host yêu cầu port khác.
plugin-port: 25580

# ── Nội dung chuyển khoản (mã đơn hàng) ─────────────────────────────────────────
# v5.0.0: tuỳ biến format mã nội dung chuyển khoản (vd "PB123456789012") — KHÔNG ảnh
# hưởng việc khớp giao dịch (hệ thống luôn so khớp không phân biệt hoa/thường), an toàn
# đổi tuỳ ý. Khuyến nghị giữ độ dài đủ lớn (≥ 6 ký tự phần random) để tránh trùng ngẫu
# nhiên với nội dung chuyển khoản khác của người dùng.
transfer-content:
  # Tiền tố đứng đầu mã (2-5 ký tự chữ cái, vd "NT"). Tự viết HOA khi dùng.
  prefix: "NT"
  # true = chèn thêm "_" ngay sau tiền tố (vd "NT_123456789012").
  # false = nối liền không có gì (vd "NT123456789012").
  require-underscore: false
  # Độ dài phần mã RANDOM phía sau tiền tố (KHÔNG tính tiền tố/underscore).
  # Tối đa 30 — set quá 30 sẽ làm SERVER/PLUGIN KHÔNG KHỞI ĐỘNG ĐƯỢC (cố ý — sai cấu
  # hình nghiêm trọng, log console sẽ ghi rõ lý do để admin sửa lại).
  code-length: 12
  # Kiểu ký tự phần random: 0 = chỉ số (MẶC ĐỊNH, khuyến nghị) | 1 = chỉ chữ | -1 = cả số và chữ.
  # ⚠ CẢNH BÁO: nếu dùng webhook SePay (không phải sepay-api self-poll), SePay tự detect
  # "mã giao dịch" theo pattern PREFIX+SỐ (vd NT[0-9]+). Đặt khác 0 (lẫn chữ) có thể khiến
  # SePay ÂM THẦM không gửi webhook cho giao dịch đó nếu dashboard SePay đang bật
  # "skip_if_no_code" (mặc định) — tiền vào nhưng plugin không hề biết. Chỉ đổi sang -1/1
  # nếu chắc chắn đã tắt skip_if_no_code, hoặc đang dùng sepay-api.enabled: true.
  code-mode: 0

# ── Lưu trữ đơn nạp cũ (bank-orders.yml / card-orders.yml) ─────────────────────
# v5.0.0: số ngày giữ lại đơn ĐÃ XỬ LÝ XONG (hết hạn/đã duyệt) trước khi tự xoá khỏi
# bộ nhớ + file lưu trữ. Đơn ĐANG CHỜ xử lý KHÔNG BAO GIỜ bị xoá dù giá trị là gì.
#   -1 = giữ VĨNH VIỄN, không bao giờ tự xoá (MẶC ĐỊNH — an toàn nhất cho việc tra soát).
#    0 = xoá NGAY (trong vòng tối đa 1 giờ — chu kỳ dọn dẹp định kỳ), không lưu lâu dài.
#   >0 = xoá sau đúng số ngày đó (vd 7 = giữ 7 ngày rồi xoá).
# Có 2 mục riêng — bank và card đặt số ngày khác nhau cũng được, không bắt buộc giống nhau.
order-retention:
  bank-days: -1
  card-days: -1

# Hiện 6 dòng thông tin (ngân hàng/STK/tên/tiền/nội dung CK/hết hạn) dưới ảnh QR hay
# chỉ hiện QR thuần (không chữ). Mặc định false = chỉ QR (full 128x128, nét hơn).
qr-show-info-overlay: false

# ── SePay API (v5.0.0 Phase B) ─────────────────────────────────────────────────
# Cách nạp bank MỚI, đơn giản hơn nhiều so với /sepaysetup cũ (chỉ cần dán 1 API
# Token — không cần webhook, không cần bot.py/ngrok, không cần biết merchant-id/
# secret-key). Plugin tự POLL trực tiếp API của SePay (my.sepay.vn) theo chu kỳ.
# Cấu hình qua lệnh trong-game: /sepaysetup (đã viết lại hoàn toàn ở v5.0.0).
# Admin KHÔNG cần tự sửa tay các dòng dưới — wizard /sepaysetup tự điền sau khi
# admin dán API token (tên ngân hàng/số TK/tên TK được lấy thẳng từ SePay).
sepay-api:
  enabled: false
  # true = dùng môi trường test my.dev.sepay.vn (không đụng tới giao dịch ngân hàng
  # thật — để bạn thử nghiệm/test plugin trước). false = dùng my.sepay.vn (thật).
  sandbox: false
  api-token: ""
  bank-account-number: ""
  bank-short-name: ""
  bank-full-name: ""
  bank-bin: ""
  account-holder-name: ""
  # Con trỏ phân trang khi poll giao dịch mới — KHÔNG tự sửa tay.
  last-transaction-id: 0
  # Số giây giữa mỗi lần poll giao dịch mới (mặc định 10s — đủ nhanh cho VietQR).
  poll-interval-seconds: 10

# ── Quick bank amounts ────────────────────────────────────────────────────────
# Các mệnh giá nhanh hiển thị trong UI nạp ngân hàng
quick-amounts:
  - 10000
  - 20000
  - 50000
  - 100000
  - 200000
  - 500000
  - 1000000

# ── Reward Multiplier ─────────────────────────────────────────────────────────
# Chế độ thưởng:
#   1 = bình thường (default)
#   2 = nhân đôi — tự động tính x2 số lượng thưởng đã cấu hình
Rewards_Card_Mode: 1
Rewards_Bank_Mode: 1

# ── Reward Effects ────────────────────────────────────────────────────────────
# Hiệu ứng khi player nạp thành công
Reward_Firework:     true   # Bắn 2 quả pháo hoa (cách nhau 2s)
Reward_Sound:        true   # Sound level-up (<100k) hoặc Epic Achievement (>=100k)
Reward_Notification: true   # Hiện dòng chữ xanh in đậm italic

