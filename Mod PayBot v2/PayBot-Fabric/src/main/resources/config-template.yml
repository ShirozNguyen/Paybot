# ── Connection ────────────────────────────────────────────────────────────────
# server-id và guild-id được tự động điền khi kết nối bot (/connect discord <guild_id>)
# KHÔNG tự tay điền — dùng lệnh trong game để set
server-id: ""
guild-id:  ""

# v5.0.5: bỏ ngrok — URL HTTPS thật của bot (VPS). Tự điền khi /connect, để trống
# nếu chưa connect. Bot tự động cập nhật giá trị này mỗi khi đổi IP/port (restart).
bot-url: ""

# v5.0.5: tự đồng bộ config.yml mỗi 10s — tự thêm key/comment thiếu, tự xoá key thừa
# không còn tác dụng (từ bản cũ để lại), tự reload khi có gì thay đổi (do bot push
# bot-url mới, do admin tự sửa tay, hay do upgrade version). Tắt nếu đang tự debug
# config thủ công và không muốn bị tự động ghi đè.
auto-config-sync: true

# Fingerprint cert HTTPS của bot (TOFU — tự lưu lần đầu kết nối, đừng tự sửa tay trừ
# khi biết chắc đang làm gì). Xem BotHttpClient.java để hiểu cơ chế.
bot-cert-fingerprint: ""
# true = từ chối thẳng nếu cert bot đổi mà không khớp fingerprint đã lưu (an toàn hơn,
# phòng MITM, nhưng phải tự xoá bot-cert-fingerprint ở trên nếu đổi VPS thật).
# false (mặc định) = chỉ cảnh báo, vẫn cho qua và tự cập nhật fingerprint mới.
bot-cert-strict-pin: false

# Port HTTP server của mod nhận SePay webhook và lệnh từ bot.
# Không dùng 25565 (port Minecraft mặc định) — mặc định 25580.
# Đổi nếu có xung đột hoặc host yêu cầu port khác.
plugin-port: 25580

# ── Nội dung chuyển khoản (mã đơn hàng) ─────────────────────────────────────
# v5.0.0: tuỳ biến format mã nội dung chuyển khoản (vd "NT123456789012")
# Khuyến nghị giữ ≥ 6 ký tự phần random để tránh trùng với nội dung CK khác.
transfer-content:
  # Tiền tố đứng đầu mã (2-5 ký tự chữ cái). Tự viết HOA khi dùng.
  prefix: "NT"
  # true = chèn thêm "_" ngay sau tiền tố (vd "NT_123456789012").
  require-underscore: false
  # Độ dài phần mã RANDOM (không tính tiền tố/underscore). Tối đa 30.
  code-length: 12
  # Kiểu ký tự phần random: 0 = chỉ số (KHUYẾN NGHỊ) | 1 = chỉ chữ | -1 = cả số và chữ.
  # ⚠ CẢNH BÁO: -1 hoặc 1 có thể khiến SePay ÂM THẦM không gửi webhook (skip_if_no_code).
  # Chỉ đổi nếu đang dùng sepay-api self-poll (không qua webhook) hoặc đã tắt skip_if_no_code.
  code-mode: 0

# ── Lưu trữ đơn nạp cũ (bank/card orders) ───────────────────────────────────────
# v5.0.0: số ngày giữ lại đơn ĐÃ XỬ LÝ XONG (hết hạn/đã duyệt) trước khi tự xoá khỏi bộ
# nhớ + file lưu trữ. Đơn ĐANG CHỜ xử lý KHÔNG BAO GIỜ bị xoá dù giá trị là gì.
#   -1 = giữ VĨNH VIỄN, không bao giờ tự xoá (MẶC ĐỊNH — an toàn nhất cho việc tra soát).
#    0 = xoá NGAY (trong vòng tối đa 1 giờ — chu kỳ dọn dẹp định kỳ), không lưu lâu dài.
#   >0 = xoá sau đúng số ngày đó (vd 7 = giữ 7 ngày rồi xoá).
order-retention:
  bank-days: -1
  card-days: -1

# Callback URL bot sẽ gọi để gửi kết quả thẻ về plugin.
# Để trống → plugin tự dùng bot-url + /api/card-callback
plugin-callback-url: ""

# ── Reward Effects ────────────────────────────────────────────────────────────
# Hiệu ứng khi player nạp thành công
Reward_Firework:     true   # Bắn 2 quả pháo hoa (cách nhau 2s)
Reward_Sound:        true   # Sound level-up (<100k) hoặc Epic Achievement (>=100k)
Reward_Notification: true   # Hiện dòng chữ xanh in đậm italic trên màn hình

# ── Reward Multiplier ─────────────────────────────────────────────────────────
# Chế độ thưởng:
#   1 = bình thường (default)
#   2 = nhân đôi — tự động tính x2 số lượng thưởng đã cấu hình
Rewards_Card_Mode: 1
Rewards_Bank_Mode: 1

# ── SePay ─────────────────────────────────────────────────────────────────────
# Cấu hình tự động qua /sepaysetup trong game
# Không tự sửa trừ khi biết mình đang làm gì
# ── SePay (webhook qua bot.py — legacy) ─────────────────────────────────────
# Dùng khi kết nối bot. Các trường này được bot.py điền tự động khi admin cấu hình
# Merchant ID + Secret Key trên dashboard SePay và gửi qua /sepaysetup trong game.
sepay:
  secret-key:   ""
  merchant-id:  ""
  bank-account: ""
  bank-name:    ""
  account-name: ""
  configured:   false

