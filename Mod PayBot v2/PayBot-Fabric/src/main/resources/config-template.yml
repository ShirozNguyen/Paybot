# ── SePay API (self-poll — KHÔNG cần webhook, KHUYẾN NGHỊ) ──────────────────
# v5.0.2 FIX: Trước đây mod chỉ hỗ trợ Merchant ID + Secret Key (qua bot.py webhook)
# — cơ chế đó phụ thuộc ngrok luôn online + bot.py đang chạy. Giờ mod đã hỗ trợ
# tự poll trực tiếp SePay API (giống plugin) mà KHÔNG cần webhook, không cần bot.
#
# Cách lấy api-token: My.SePay.vn → Cấu hình Công ty → API Access → API Token
# (KHÔNG phải Merchant ID, KHÔNG phải Secret Key — đó là token khác dùng cho webhook).
#
# Sau khi điền api-token và dùng lệnh /sepaysetup trong game, mod sẽ TỰ lấy thông tin
# ngân hàng (STK, tên ngân hàng, tên chủ TK) từ API — không cần điền thủ công.
#
# Các trường bank-* được tự điền khi /sepaysetup hoàn tất — KHÔNG tự sửa thủ công.
sepay-api:
  # Token SePay API (lấy tại My.SePay.vn → Cấu hình Công ty → API Access)
  api-token: ""
  # Các trường dưới đây được điền TỰ ĐỘNG khi /sepaysetup — không sửa thủ công
  bank-account-number: ""
  bank-short-name:     ""
  bank-full-name:      ""
  bank-bin:            ""
  account-holder-name: ""
  # ID giao dịch cuối cùng đã xử lý (để poll không bị lặp) — do mod tự quản lý
  last-transaction-id: 0
  # Khoảng cách poll (giây). Mặc định 10s. Không đặt dưới 5s để tránh bị SePay rate-limit.
  poll-interval-seconds: 10

# ── Giới hạn thông báo (chống spam log/chat) ─────────────────────────────────
# Số thông báo cùng loại tối đa / phút (rate limit để tránh spam admin).
# false = tắt giới hạn hoàn toàn (ghi mọi sự kiện vào log/chat).
Max_Notifications: 20

# ── Loại thông báo bật/tắt ────────────────────────────────────────────────────
# true = hiện thông báo này lên chat admin / console.
# false = im lặng với loại thông báo này (vẫn hoạt động bình thường, chỉ không báo).
notifications:
  qr-created:           true   # Map QR tạo thành công
  qr-create-fail:       true   # Tạo/tải ảnh QR thất bại
  card-submitted:       true   # Player vừa gửi thẻ cào
  card-submit-fail:     true   # Gửi thẻ lên bot thất bại
  card-api-error:       true   # Lỗi giao tiếp web gạch thẻ
  sepay-error:          true   # Lỗi giao tiếp SePay API
  bank-payment-received: true  # Thanh toán bank nhận được (tự giao thưởng hoặc chờ /approve)
  approve-fail:         true   # Duyệt đơn thất bại
  reward-invalid:       true   # Lệnh thưởng sai/chưa cấu hình
  reward-dispatch:      true   # Lệnh thưởng được dispatch (tắt nếu spam quá nhiều)
  reward-queued-offline: true  # Player offline khi nạp — xếp hàng chờ
  firework-fail:        true   # Bắn pháo/âm thanh thất bại (thường do thiếu permission)
  order-expired:        true   # Đơn QR hết hạn 30 phút
  bot-disconnect:       true   # Bot Discord ngắt kết nối
  http-error:           true   # Lỗi webhook/HTTP server
